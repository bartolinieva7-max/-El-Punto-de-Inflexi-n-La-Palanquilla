<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Cuestionario: El Punto de Inflexión - La Palanquilla</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #fce4ec 0%, #fff3e0 50%, #e0e7ff 100%);
            font-family: 'Segoe UI', 'Roboto', 'Poppins', system-ui, sans-serif;
            padding: 1rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quiz-wrapper {
            max-width: 880px;
            width: 100%;
            margin: 0 auto;
            background: #fffffff0;
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.25);
            padding: 1.8rem;
            transition: all 0.2s;
        }

        .header {
            text-align: center;
            margin-bottom: 1.2rem;
            border-bottom: 4px solid #ff8c42;
            padding-bottom: 0.7rem;
        }

        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #1e6f9f, #e67e22);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.2px;
        }

        .sub {
            color: #e67e22;
            font-size: 0.85rem;
            margin-top: 0.2rem;
            font-weight: 600;
        }

        .progress-area {
            background: #e6e0f0;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: #1a4a6e;
            font-weight: 700;
        }

        .question-counter {
            font-weight: 800;
            background: #ffcc88;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            color: #5a3a1a;
        }

        .score-badge {
            background: #88ccaa;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-weight: 700;
            color: #1a4a2e;
        }

        .question-card {
            background: #ffffff;
            border-radius: 1.5rem;
            padding: 1.3rem;
            margin-bottom: 1.2rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            border-left: 8px solid #ff8c42;
            border-right: 1px solid #f0e0d0;
        }

        .question-text {
            font-size: 1.08rem;
            font-weight: 800;
            color: #2c3e66;
            margin-bottom: 1.2rem;
            line-height: 1.4;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .option {
            display: flex;
            align-items: flex-start;
            gap: 0.8rem;
            cursor: pointer;
            padding: 0.6rem 0.8rem;
            border-radius: 1rem;
            background: #fefaf5;
            border: 2px solid #e0d0c0;
            transition: all 0.15s;
        }

        .option:hover {
            background: #fff4e6;
            border-color: #ffaa66;
            transform: scale(1.01);
        }

        input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            width: 1.2rem;
            height: 1.2rem;
            border: 2px solid #e67e22;
            border-radius: 50%;
            margin-top: 0.1rem;
            cursor: pointer;
            background: white;
            flex-shrink: 0;
        }

        input[type="radio"]:checked {
            background-color: #e67e22;
            border-color: #e67e22;
            box-shadow: inset 0 0 0 3px white;
        }

        .option label {
            flex: 1;
            font-size: 0.95rem;
            line-height: 1.4;
            cursor: pointer;
            color: #2c3e66;
            font-weight: 600;
        }

        .feedback {
            margin-top: 0.8rem;
            padding: 0.7rem 1rem;
            border-radius: 1rem;
            font-size: 0.85rem;
            background: #fef7e8;
            border-left: 5px solid;
            line-height: 1.4;
            color: #2c3e50;
        }

        .feedback.correct {
            border-left-color: #44aa66;
            background: #e0ffe8;
        }

        .feedback.incorrect {
            border-left-color: #ff6666;
            background: #ffe6e6;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 1rem;
        }

        .btn {
            border: none;
            background: #ddd0c0;
            color: #4a3a2a;
            font-weight: 800;
            padding: 0.6rem 1.3rem;
            border-radius: 60px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .btn-primary {
            background: #3a86ff;
            color: white;
        }

        .btn-primary:hover {
            background: #2a6ad0;
            transform: scale(1.02);
        }

        .btn-secondary {
            background: #e67e22;
            color: white;
        }

        .btn-secondary:hover {
            background: #d46a10;
        }

        .btn-reset {
            background: #cc6644;
            color: white;
        }

        .btn-reset:hover {
            background: #aa4422;
        }

        .btn-success {
            background: #44aa66;
            color: white;
        }

        .btn-success:hover {
            background: #338855;
        }

        .results-area {
            margin-top: 1.5rem;
            background: #fff2e0;
            border-radius: 1.2rem;
            padding: 1rem;
            border: 2px solid #ffaa33;
            display: none;
        }

        .results-area h3 {
            color: #cc5500;
            margin-bottom: 0.5rem;
        }

        .result-summary {
            font-size: 1rem;
            margin-bottom: 1rem;
            text-align: center;
            font-weight: bold;
            color: #1f4a2e;
        }

        .result-detail {
            max-height: 280px;
            overflow-y: auto;
            font-size: 0.8rem;
        }

        .result-item {
            padding: 0.4rem;
            border-bottom: 1px solid #ffd9a0;
            display: flex;
            gap: 0.5rem;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 1.2rem;
            color: #aa8855;
        }

        @media (max-width: 600px) {
            .quiz-wrapper {
                padding: 1rem;
            }
            .question-text {
                font-size: 0.98rem;
            }
            .option label {
                font-size: 0.88rem;
            }
            .btn {
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-wrapper">
    <div class="header">
        <h1>🏭 El Punto de Inflexión: La Palanquilla</h1>
        <div class="sub">Laminación, trefilado, perfilado y procesos siderúrgicos</div>
    </div>

    <div class="progress-area">
        <span class="question-counter" id="questionCounter">Pregunta 1 / 20</span>
        <span class="score-badge" id="liveScore">✅ Aciertos: 0</span>
    </div>

    <div id="questionContainer"></div>

    <div class="nav-buttons">
        <button id="prevBtn" class="btn btn-secondary">◀ Anterior</button>
        <button id="nextBtn" class="btn btn-primary">Siguiente ▶</button>
        <button id="resetBtn" class="btn btn-reset">⟳ Reiniciar</button>
        <button id="finalScoreBtn" class="btn btn-success">📊 Ver total</button>
    </div>

    <div id="resultsPanel" class="results-area"></div>
    <footer>📌 Selecciona una opción → retroalimentación inmediata. Al finalizar, revisa tu puntuación.</footer>
</div>

<script>
    // ==================== DATOS DEL CUESTIONARIO (20 preguntas) ====================
    // Respuestas deducidas del contexto técnico del PDF
    const questionsData = [
        { text: "¿Qué característica geométrica define a la palanquilla en la etapa semiterminada del acero?",
          options: ["Sección transversal cuadrada optimizada", "Perfil en H con alas gruesas", "Superficie cilíndrica uniforme pulida", "Sección triangular para laminado fino"],
          correct: "a",
          explanation: "Correcta (a): La palanquilla se caracteriza por tener una sección transversal cuadrada, ideal para procesos de laminación posteriores."
        },
        { text: "Una acería debe seleccionar un punto de partida que minimice ajustes químicos posteriores y maximice la deformación física eficiente. ¿Qué elección es más adecuada y por qué?",
          options: ["Palanquilla por ser el final químico e inicio ideal", "Alambrón por tener geometría poco controlada", "Plancha porque permite tratamientos químicos extensos", "Bloom porque requiere más refinamiento químico"],
          correct: "a",
          explanation: "Correcta (a): La palanquilla representa el final del proceso químico y el inicio óptimo de la conformación mecánica."
        },
        { text: "¿Cuál de las siguientes aplicaciones industriales corresponde directamente al uso de palanquillas?",
          options: ["Recubrimientos anticorrosivos por inmersión", "Barras de refuerzo y vigas en construcción", "Fabricación de vidrio templado y laminado", "Procesamiento de polímeros termoestables"],
          correct: "b",
          explanation: "Correcta (b): Las palanquillas se utilizan para fabricar barras de refuerzo, vigas y perfiles estructurales."
        },
        { text: "En el diagrama, ¿qué función principal cumplen los rodillos en la laminación?",
          options: ["Aplican la presión directa al material", "Soportan el peso y las fuerzas extremas", "Aseguran la orientación y las tolerancias", "Convierten energía térmica en eléctrica"],
          correct: "a",
          explanation: "Correcta (a): Los rodillos aplican presión directa para deformar el material metálico durante la laminación."
        },
        { text: "Según la ilustración, ¿qué describe mejor la bancada del tren de laminación?",
          options: ["Sensores que garantizan tolerancias", "Estructura robusta que soporta cargas", "Par de cilindros que reducen espesor", "Motores y reductores de precisión"],
          correct: "b",
          explanation: "Correcta (b): La bancada es la estructura robusta diseñada para soportar las enormes cargas durante la laminación."
        },
        { text: "¿Qué rango de temperaturas caracteriza la laminación en caliente mostrada?",
          options: ["Novecientos a mil doscientos grados", "Cincuenta a cien grados", "Dos mil a tres mil grados", "Cero a veinte grados"],
          correct: "a",
          explanation: "Correcta (a): La laminación en caliente típicamente se realiza entre 900°C y 1200°C para facilitar la deformación."
        },
        { text: "En la lámina sobre laminación en frío, ¿qué efecto termodinámico se destaca?",
          options: ["Se funde parcialmente el acero", "La temperatura reduce la viscosidad", "El metal se vuelve más maleable", "El material se endurece por deformación"],
          correct: "d",
          explanation: "Correcta (d): En la laminación en frío se produce endurecimiento por deformación (work hardening) sin cambios de temperatura significativos."
        },
        { text: "Un ingeniero necesita producir láminas muy finas con excelente acabado superficial. Según los diagramas, ¿qué proceso elegiría y por qué?",
          options: ["Laminación mixta por menor costo", "Laminación en caliente por maleabilidad", "Laminación en caliente por rapidez", "Laminación en frío por alta precisión"],
          correct: "d",
          explanation: "Correcta (d): La laminación en frío ofrece alta precisión dimensional y excelente acabado superficial."
        },
        { text: "Si el objetivo es una reducción masiva del espesor inicial de un planchón grueso, ¿cuál es la decisión más adecuada?",
          options: ["Laminación en caliente por productos gruesos", "Laminación en frío por dureza del metal", "Rectificado final por tolerancias finas", "Temple directo para alta resistencia"],
          correct: "a",
          explanation: "Correcta (a): La laminación en caliente permite reducciones masivas de espesor gracias a la mayor ductilidad del material."
        },
        { text: "En el equipo mostrado, ¿qué componente asegura un giro constante de los rodillos?",
          options: ["Refrigeración con agua pulverizada", "Bancada de estructura reforzada", "Guías de orientación automatizadas", "Sistema de accionamiento con reductores"],
          correct: "d",
          explanation: "Correcta (d): El sistema de accionamiento con motores y reductores garantiza un giro constante y controlado."
        },
        { text: "En el trefilado, ¿qué cambio dimensional principal ocurre en la pieza metálica al pasar por la matriz?",
          options: ["Disminuye el espesor y acorta la longitud", "Aumenta el diámetro y disminuye la longitud", "Disminuye el diámetro y aumenta la longitud", "Se mantiene el diámetro y aumenta el espesor"],
          correct: "c",
          explanation: "Correcta (c): El trefilado reduce el diámetro mientras alarga la pieza, manteniendo el volumen constante."
        },
        { text: "¿Cuál es una ventaja clave del perfilado con rodillos en líneas continuas?",
          options: ["Alta productividad y costo eficiente", "Aplicable solo a geometrías sólidas", "Precisión baja y pocas estaciones", "Elevado desperdicio y baja velocidad"],
          correct: "a",
          explanation: "Correcta (a): El perfilado en línea continua ofrece alta productividad y eficiencia de costes para grandes volúmenes."
        },
        { text: "Selecciona el producto más típico del trefilado en procesos industriales.",
          options: ["Chapas planas de baja dureza", "Piezas fundidas de formas libres", "Perfiles U para estructuras ligeras", "Alambres de acero de alta resistencia"],
          correct: "d",
          explanation: "Correcta (d): El trefilado se utiliza principalmente para producir alambres de acero de alta resistencia."
        },
        { text: "En el perfilado progresivo, ¿qué operación realizan las múltiples estaciones de rodillos sobre la lámina?",
          options: ["Tensan la lámina sin cambiar forma", "Conforman gradualmente la sección deseada", "Perforan orificios antes del doblado", "Cortan transversalmente a cada paso"],
          correct: "b",
          explanation: "Correcta (b): Las estaciones sucesivas conforman gradualmente la sección transversal deseada del perfil."
        },
        { text: "Una fábrica necesita producir canales estructurales largos con tolerancias estrechas. ¿Qué proceso es más adecuado y por qué?",
          options: ["Perfilado, por su conformado continuo y tolerancias altas", "Fundición, por su versatilidad en cavidades complejas", "Trefilado, por su reducción de diámetro controlada", "Forja, por su compresión local y alta tenacidad"],
          correct: "a",
          explanation: "Correcta (a): El perfilado continuo permite producir canales largos con alta precisión dimensional y tolerancias estrechas."
        },
        { text: "En la laminación de acero, ¿qué aportan los gemelos digitales según la práctica actual?",
          options: ["Sustituyen completamente los rodillos físicos reales", "Registran solo temperaturas de hornos industriales", "Simulan virtualmente diseño y condiciones operativas", "Aumentan la fricción para mayor conformado final"],
          correct: "c",
          explanation: "Correcta (c): Los gemelos digitales simulan virtualmente el diseño y las condiciones operativas para optimizar procesos."
        },
        { text: "Ordena correctamente las fases clave del ciclo moderno del acero, comenzando en la extracción.",
          options: ["Conformación → Tierra → Uso → Reciclaje → Puente físico → Fuego", "Puente físico → Conformación → Fuego químico → Tierra → Uso → Reciclaje", "Uso → Reciclaje → Tierra → Fuego químico → Conformación → Puente", "Tierra → Fuego químico → Puente físico → Conformación → Uso → Reciclaje"],
          correct: "d",
          explanation: "Correcta (d): Extracción (tierra), refinación (fuego químico), colada (puente físico), laminación (conformación), uso y reciclaje."
        },
        { text: "Un ingeniero busca reducir drásticamente la fricción durante el trefilado para cambiar de configuración más rápido. ¿Qué innovación debe elegir?",
          options: ["Rodillos pasivos con recubrimiento blando", "Simulación numérica sin sensores físicos", "Temple rápido con enfriamiento criogénico", "Trefilado ultrasónico con vibración aplicada"],
          correct: "d",
          explanation: "Correcta (d): El trefilado ultrasónico aplica vibraciones de alta frecuencia que reducen la fricción y permiten cambios más rápidos."
        },
        { text: "Se desea heredar alta calidad dimensional en laminación de la Fase 2. ¿Qué controles previos son críticos según la síntesis del ciclo?",
          options: ["Cambios de diseño sin pruebas virtuales", "Uso anticipado en infraestructura civil", "Solo aumento de velocidad de los rodillos", "Eliminación de impurezas y control térmico de grano"],
          correct: "d",
          explanation: "Correcta (d): La calidad dimensional requiere un control riguroso de impurezas y de la microestructura mediante el control térmico del grano."
        },
        { text: "Para lograr cero defectos en piezas de acero del futuro, ¿qué combinación es coherente con las metas planteadas?",
          options: ["Automatización robótica y control de IA milimétrica", "Evitar aleaciones y mantener composiciones fijas", "Incremento manual de inspecciones visuales", "Único uso de hornos altos convencionales"],
          correct: "a",
          explanation: "Correcta (a): La combinación de automatización robótica e inteligencia artificial permite un control milimétrico para alcanzar cero defectos."
        }
    ];

    let userAnswers = new Array(20).fill(null);
    let currentIndex = 0;

    const questionContainer = document.getElementById('questionContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const resetBtn = document.getElementById('resetBtn');
    const finalScoreBtn = document.getElementById('finalScoreBtn');
    const questionCounterSpan = document.getElementById('questionCounter');
    const liveScoreSpan = document.getElementById('liveScore');
    const resultsPanel = document.getElementById('resultsPanel');

    function updateLiveScore() {
        let correctCount = 0;
        for (let i = 0; i < userAnswers.length; i++) {
            if (userAnswers[i] && userAnswers[i] === questionsData[i].correct) correctCount++;
        }
        liveScoreSpan.textContent = `✅ Aciertos: ${correctCount} / 20`;
        return correctCount;
    }

    function saveAnswer(selectedLetter) {
        userAnswers[currentIndex] = selectedLetter;
        updateLiveScore();
        renderCurrentQuestion();
    }

    function renderCurrentQuestion() {
        const q = questionsData[currentIndex];
        const selected = userAnswers[currentIndex];
        const letters = ['a', 'b', 'c', 'd'];
        let optionsHtml = '';
        q.options.forEach((opt, idx) => {
            const letter = letters[idx];
            const isChecked = (selected === letter);
            optionsHtml += `
                <div class="option" data-letter="${letter}">
                    <input type="radio" name="question" value="${letter}" id="opt_${letter}" ${isChecked ? 'checked' : ''}>
                    <label for="opt_${letter}"><strong>${letter.toUpperCase()})</strong> ${opt}</label>
                </div>
            `;
        });

        let feedbackHtml = '';
        if (selected) {
            const isCorrect = (selected === q.correct);
            const correctLetter = q.correct;
            const correctText = q.options[letters.indexOf(correctLetter)];
            const explanation = q.explanation;
            if (isCorrect) {
                feedbackHtml = `<div class="feedback correct">✅ <strong>¡Correcto!</strong> ${explanation}</div>`;
            } else {
                feedbackHtml = `<div class="feedback incorrect">❌ <strong>Incorrecto.</strong> La respuesta correcta es ${correctLetter.toUpperCase()}) ${correctText}.<br>${explanation}</div>`;
            }
        } else {
            feedbackHtml = `<div class="feedback" style="border-left-color:#ffcc88; background:#fff5e6;">⚡ Selecciona una opción para ver la retroalimentación.</div>`;
        }

        const html = `
            <div class="question-card">
                <div class="question-text">${q.text}</div>
                <div class="options" id="optionsContainer">
                    ${optionsHtml}
                </div>
                ${feedbackHtml}
            </div>
        `;
        questionContainer.innerHTML = html;

        // Event listeners para opciones
        const optionDivs = document.querySelectorAll('.option');
        optionDivs.forEach(div => {
            const radio = div.querySelector('input[type="radio"]');
            const letter = div.getAttribute('data-letter');
            if (radio) {
                radio.addEventListener('change', () => {
                    if (radio.checked) saveAnswer(letter);
                });
            }
            div.addEventListener('click', (e) => {
                if (e.target.tagName !== 'INPUT') {
                    const radioInside = div.querySelector('input');
                    if (radioInside && !radioInside.checked) {
                        radioInside.checked = true;
                        saveAnswer(letter);
                    }
                }
            });
        });

        questionCounterSpan.textContent = `Pregunta ${currentIndex+1} / 20`;
    }

    function showFinalResults() {
        let correctCount = 0;
        let detailsHtml = '';
        for (let i = 0; i < questionsData.length; i++) {
            const q = questionsData[i];
            const userAns = userAnswers[i];
            const isCorrect = (userAns === q.correct);
            if (isCorrect) correctCount++;
            const statusIcon = isCorrect ? '✅' : '❌';
            const userShow = userAns ? userAns.toUpperCase() : '—';
            const correctShow = q.correct.toUpperCase();
            detailsHtml += `
                <div class="result-item">
                    <span style="min-width: 30px;">${statusIcon}</span>
                    <span><strong>Pregunta ${i+1}</strong> (Tu respuesta: ${userShow} / Correcta: ${correctShow})</span>
                </div>
            `;
        }
        const percent = Math.round((correctCount / 20) * 100);
        resultsPanel.innerHTML = `
            <h3>📊 Resultado final</h3>
            <div class="result-summary">🎯 Aciertos: ${correctCount} de 20 (${percent}%)</div>
            <div class="result-detail">${detailsHtml}</div>
            <button id="closeResultsBtn" class="btn btn-secondary" style="margin-top: 10px; width:100%;">✖ Cerrar resumen</button>
        `;
        resultsPanel.style.display = 'block';
        document.getElementById('closeResultsBtn')?.addEventListener('click', () => {
            resultsPanel.style.display = 'none';
        });
        alert(`📊 Cuestionario completado.\nAciertos: ${correctCount} de 20 (${percent}%)\nRevisa el resumen detallado en pantalla.`);
    }

    function nextQuestion() {
        if (currentIndex < 19) {
            currentIndex++;
            renderCurrentQuestion();
        } else {
            const unanswered = userAnswers.filter(a => a === null).length;
            if (unanswered > 0) {
                if (confirm(`Aún tienes ${unanswered} pregunta(s) sin responder. ¿Deseas finalizar de todas formas? Las no respondidas se contarán como incorrectas.`)) {
                    showFinalResults();
                }
            } else {
                showFinalResults();
            }
        }
    }

    function prevQuestion() {
        if (currentIndex > 0) {
            currentIndex--;
            renderCurrentQuestion();
        } else {
            alert("Ya estás en la primera pregunta.");
        }
    }

    function resetQuiz() {
        if (confirm("¿Reiniciar todo el cuestionario? Se perderán todas las respuestas.")) {
            userAnswers = new Array(20).fill(null);
            currentIndex = 0;
            resultsPanel.style.display = 'none';
            updateLiveScore();
            renderCurrentQuestion();
        }
    }

    prevBtn.addEventListener('click', prevQuestion);
    nextBtn.addEventListener('click', nextQuestion);
    resetBtn.addEventListener('click', resetQuiz);
    finalScoreBtn.addEventListener('click', showFinalResults);

    renderCurrentQuestion();
    updateLiveScore();
</script>
</body>
</html>
